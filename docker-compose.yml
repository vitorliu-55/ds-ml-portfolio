version: "3.9"

services:
  s3:
    restart: always
    image: quay.io/minio/minio
    container_name: mlflow_minio
    working_dir: /app
    volumes:
      - ./minio_data:/data
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_pwd
    command: server /data --console-address ":9001"
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    #   interval: 30s
    #   timeout: 20s
    #   retries: 3

  create-bucket:
    image: minio/mc
    depends_on:
      - s3
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://s3:9000 minio_user minio_pwd;
      mc mb local/mlflow || true;
      mc ls local;
      "

  mlflow:
    restart: always
    image: python:3.11-slim
    container_name: mlflow_server
    working_dir: /app
    volumes:
      - ./mlflow_data:/app
    environment:
      # - SERVER_NAME=mlflow:5000
      - MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE=true
      - MLFLOW_SERVER_ALLOWED_HOSTS=mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000
      - AWS_ACCESS_KEY_ID=minio_user
      - AWS_SECRET_ACCESS_KEY=minio_pwd
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9000
      - MLFLOW_S3_IGNORE_TLS=true
      - MLFLOW_HOSTED_AT=http://mlflow:5000
    ports:
      - "5000:5000"

    command:
      - sh
      - -c
      - |
        pip install mlflow boto3 && \
        mlflow server \
          --backend-store-uri sqlite:////app/db/mlflow.db \
          --serve-artifacts \
          --artifacts-destination s3://mlflow \
          --host 0.0.0.0 \
          --port 5000
      
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5000/"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

  api:
    build: ./api
    container_name: api
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"