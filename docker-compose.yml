version: "3.9"

services:

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mlflow-server:/app
      - ./mlflow-server/mlruns:/mlruns
    command:
      - sh
      - -c
      - |
        pip install mlflow && \
        mlflow server \
        --backend-store-uri sqlite:////app/mlflow.db \
        --default-artifact-root /mlruns \
        --host 0.0.0.0 \
        --port 5000
    ports:
      - "5000:5000"

  api:
    build: ./api
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"